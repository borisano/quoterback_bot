# Name of your application. Used to uniquely configure containers.
service: quoterback_bot

# Name of the container image.
image: borisano/quoterback_bot

# Deploy to these servers.
servers:
  web:
    - 52.17.14.111

# Enable SSL via Let's Encrypt. Requires config.assume_ssl and config.force_ssl in production.rb.
proxy:
  ssl: true
  host: quoterback.borisano.com

# Where you keep your container images.
registry:
  server: registry-1.docker.io
  username: borisano
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - TELEGRAM_BOT_TOKEN
    - TELEGRAM_WEBHOOK_SECRET
    - ROLLBAR_ACCESS_TOKEN
    - ADMIN_USERNAME
    - ADMIN_PASSWORD
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process.
    SOLID_QUEUE_IN_PUMA: true

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for sqlite database files and Active Storage files.
volumes:
  - "quoterback_bot_storage:/rails/storage"

asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

ssh:
  user: ubuntu
